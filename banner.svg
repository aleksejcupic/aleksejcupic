<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 260">
  <defs>
    <radialGradient id="glowLeft" cx="20%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#4ade80;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="80%" cy="50%" r="35%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#4ade80;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="nameUnderline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#4ade80;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#4ade80;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="830" height="260" fill="#080808" rx="6"/>

  <!-- Area glows -->
  <rect width="830" height="260" fill="url(#glowLeft)"/>
  <rect width="830" height="260" fill="url(#glowRight)"/>

  <!-- Corner brackets -->
  <path d="M16,16 L16,42 M16,16 L42,16" stroke="#4ade80" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M814,16 L814,42 M814,16 L788,16" stroke="#4ade80" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M16,244 L16,218 M16,244 L42,244" stroke="#4ade80" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M814,244 L814,218 M814,244 L788,244" stroke="#4ade80" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- Subtle accent lines -->
  <line x1="56" y1="30" x2="56" y2="62" stroke="#4ade80" stroke-width="1.5" opacity="0.35"/>
  <line x1="774" y1="36" x2="774" y2="72" stroke="#4ade80" stroke-width="1.5" opacity="0.3"/>

  <!-- Name -->
  <text x="100" y="80"
    font-family="'Inter','Helvetica Neue',sans-serif"
    font-size="44" font-weight="700" text-anchor="start" fill="#ebebeb" letter-spacing="-1">Aleksej Cupic</text>

  <!-- Underline accent -->
  <rect x="100" y="90" width="280" height="2" fill="url(#nameUnderline)" rx="1"/>

  <!-- Terminal-style subtitle -->
  <text x="100" y="124"
    font-family="'JetBrains Mono','Courier New',monospace"
    font-size="16" fill="#4ade80" opacity="0.85">&gt;_ </text>
  <text x="132" y="124"
    font-family="'JetBrains Mono','Courier New',monospace"
    font-size="16" fill="#909090">software engineer</text>

  <!-- Dashed separator -->
  <line x1="60" y1="156" x2="770" y2="156"
    stroke="#4ade80" stroke-width="1" opacity="0.2" stroke-dasharray="4,4"/>

  <!-- Tech stack row -->
  <!-- .NET pill -->
  <rect x="60" y="178" width="100" height="36" rx="18"
    fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.5"/>
  <text x="110" y="202"
    font-family="'JetBrains Mono','Courier New',monospace"
    font-size="16" font-weight="600" text-anchor="middle" fill="#4ade80">.NET</text>

  <!-- Azure pill -->
  <rect x="176" y="178" width="100" height="36" rx="18"
    fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.5"/>
  <text x="226" y="202"
    font-family="'JetBrains Mono','Courier New',monospace"
    font-size="16" font-weight="600" text-anchor="middle" fill="#4ade80">Azure</text>

  <!-- Angular pill -->
  <rect x="292" y="178" width="114" height="36" rx="18"
    fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.5"/>
  <text x="349" y="202"
    font-family="'JetBrains Mono','Courier New',monospace"
    font-size="16" font-weight="600" text-anchor="middle" fill="#4ade80">Angular</text>

  <!-- SQL pill (dimmer) -->
  <rect x="422" y="178" width="80" height="36" rx="18"
    fill="none" stroke="#ebebeb" stroke-width="1" opacity="0.25"/>
  <text x="462" y="202"
    font-family="'JetBrains Mono','Courier New',monospace"
    font-size="16" text-anchor="middle" fill="#ebebeb" opacity="0.5">SQL</text>

  <!-- C# pill (dimmer) -->
  <rect x="518" y="178" width="72" height="36" rx="18"
    fill="none" stroke="#ebebeb" stroke-width="1" opacity="0.25"/>
  <text x="554" y="202"
    font-family="'JetBrains Mono','Courier New',monospace"
    font-size="16" text-anchor="middle" fill="#ebebeb" opacity="0.5">C#</text>

  <!-- AWS pill (dimmer) -->
  <rect x="606" y="178" width="80" height="36" rx="18"
    fill="none" stroke="#ebebeb" stroke-width="1" opacity="0.25"/>
  <text x="646" y="202"
    font-family="'JetBrains Mono','Courier New',monospace"
    font-size="16" text-anchor="middle" fill="#ebebeb" opacity="0.5">AWS</text>


  <!-- Bottom tagline -->
  <text x="415" y="244"
    font-family="'JetBrains Mono','Courier New',monospace"
    font-size="12" text-anchor="middle" fill="#555555">financial data systems · ETL pipelines · cloud-native architecture</text>
</svg>
